#---------------------------------------------------#
# 配置文件需要放置在 $HOME/.config/clash/config.yml
# 或者运行目录下的config.yml
#---------------------------------------------------#

mixed-port: 7890             # 监听端口，支持 HTTP 和 SOCKS 协议混合使用
ipv6: false                 # 是否启用 IPv6 支持，启用时为 true，否则 false
allow-lan: true             # 是否允许局域网设备连接代理服务
unified-delay: true         # 是否启用统一延迟模式，用以平衡测速结果的稳定性
tcp-concurrent: true        # 是否启用 TCP 并发连接，提高连接速度
global-client-fingerprint: chrome  # 伪装浏览器指纹，提升兼容性
keep-alive-idle: 600        # TCP KeepAlive 空闲时间，单位秒
keep-alive-interval: 15     # TCP KeepAlive 包间隔时间，单位秒
external-controller: '127.0.0.1:9090'  # 外部控制监听地址和端口（本地默认）

profile:
  store-selected: true      # 记录用户选择的节点，方便下次自动使用
  store-fake-ip: true       # 存储 Fake IP 地址缓存，提高 Fake IP 效率

cfw-latency-url: https://connectivitycheck.gstatic.com/generate_204  # 用于测速的URL
cfw-latency-type: 1        # 测速类型，1 表示 HTTP 测速
cfw-latency-timeout: 5000  # 测速超时时间，单位毫秒
cfw-conn-break-strategy: true  # 启用连接中断策略，提升连接可靠性

clash-for-android:
  append-system-dns: false  # 是否附加系统DNS，安卓App专用
  ui-subtitle-pattern: "[一-龥]{2,4}"  # UI 显示的子标题正则，匹配中文2到4个字符

sniffer:
  enable: true               # 启用嗅探功能，解析流量类型
  parse-pure-ip: true        # 是否识别纯IP流量
  sniff:                    # 嗅探协议和端口设置
    HTTP: 
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:             # 强制嗅探指定域名
    - +.v2ex.com
  skip-domain:              # 跳过嗅探的域名列表
    - dlg.io.mi.com
    - +.push.apple.com
    - +.apple.com

tun:
  enable: true              # 启用 TUN 模式，绕过系统代理限制
  stack: mixed              # 网络协议栈，mixed 支持 IPv4 和 IPv6
  dns-hijack: ['any:53', 'tcp://any:53']  # 劫持 DNS 请求端口，避免 DNS 泄露
  auto-route: true          # 自动添加路由规则
  auto-redirect: true       # 自动路由重定向
  auto-detect-interface: true  # 自动检测网络接口

dns:
  enable: true              # 启用内置 DNS 解析
  listen: "0.0.0.0:1053"   # DNS 服务监听地址和端口
  ipv6: false               # 是否启用 IPv6 DNS 支持
  prefer-h3: true           # 优先使用 HTTP/3 DNS 解析
  respect-rules: true       # 遵守规则集的 DNS 策略
  use-system-hosts: false   # 是否使用系统 Hosts 文件
  cache-algorithm: "arc"    # DNS 缓存算法，arc 为先进先出改进版
  enhanced-mode: fake-ip    # DNS 增强模式，fake-ip 可防止 DNS 污染
  fake-ip-range: 198.18.0.1/16  # fake-ip 地址段，防止冲突
  fake-ip-filter:           # 不使用 fake-ip 模式的域名列表
    - +.lan
    - +.local
    - connect.rom.miui.com
    - +.miwifi.com
    - +.ntp.org
    - +.u-tools.cn
    - +.mediatek.com
    - +.cfprefer1.xyz
    - +.wetab.link
    - +.tyasaka.xyz
    - localhost.ptlogin2.qq.com
    - localhost.sec.qq.com
    - localhost.work.weixin.qq.com
    - +.weixin.qq.com
    - +.wechat.com
    - time.windows.com
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.wpsmail.net
    - +.henzanapp.com
    - +.pconline.com.cn
  default-nameserver:       # 默认 DNS 服务器列表，主要为国内DNS
    - "223.5.5.5"
    - "1.2.4.8"
  nameserver:               # 上游 DNS-over-HTTPS 服务器地址
    - "https://208.67.222.222/dns-query"
    - "https://1.1.1.1/dns-query"
    - "https://8.8.4.4/dns-query"
  proxy-server-nameserver:  # 走代理时使用的 DNS 服务器
    - "https://223.5.5.5/dns-query"
    - "https://120.53.53.53/dns-query"
  nameserver-policy:        # 域名分流的DNS策略配置
    "geosite:cn,private":
      - "https://120.53.53.53/dns-query"
      - "https://223.5.5.5/dns-query"
    "geosite:geolocation-!cn":
      - "https://dns.cloudflare.com/dns-query"
      - "https://dns.google/dns-query"

cfw-bypass:                 # 系统代理跳过列表（起作用）
  - "*.cn"
  - "*.xn--fiqs8s"
  - "*.xn--55qx5d"
  - "*.xn--io0a7i"
  - "*alicdn*"
  - "*alipay*"
  - "*bilibili*"
  - "*xiaomi*"
  - "*.360.com"
  - "*.alibaba.com"
  - "*.aliyun.com"
  - "*.aliyundrive.com"
