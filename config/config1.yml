#---------------------------------------------------#
# 配置文件需要放置在 $HOME/.config/clash/config.yml
# 或者运行目录下的config.yml
#---------------------------------------------------#

# 各端口配置
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894

# IPv6
ipv6: true

# 允许局域网连接
allow-lan: true

# 统一延迟
unified-delay: true

# TCP 并发
tcp-concurrent: true

# RESTful API
external-controller: '127.0.0.1:9090'

# 全局客户端指纹
global-client-fingerprint: chrome

# Profile 缓存设置
profile:
  store-selected: true
  store-fake-ip: true

# 规则模式
# mode: rule

# 日志级别
log-level: info

# Clash for Windows 相关设置
cfw-latency-url: https://connectivitycheck.gstatic.com/generate_204
cfw-latency-type: 1
cfw-latency-timeout: 5000
cfw-conn-break-strategy: true

# Clash for Android 相关设置
clash-for-android:
  append-system-dns: false
  ui-subtitle-pattern: "[一-龥]{2,4}"

# 嗅探设置
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - '+.v2ex.com'
  skip-domain:
    - 'dlg.io.mi.com'
    - '+.push.apple.com'
    - '+.apple.com'

# DNS 设置
dns:
  enable: true
  listen: '0.0.0.0:1053'
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - 'connect.rom.miui.com'
    - '+.miwifi.com'
    - '+.ntp.org'
    - '+.u-tools.cn'
    - '+.mediatek.com'
    - '+.cfprefer1.xyz'
    - '+.wetab.link'
    - '+.tyasaka.xyz'
    - 'localhost.ptlogin2.qq.com'
    - 'localhost.sec.qq.com'
    - 'localhost.work.weixin.qq.com'
    - '+.weixin.qq.com'
    - '+.wechat.com'
    - 'time.windows.com'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.wpsmail.net'
    - '+.henzanapp.com'
    - '+.pconline.com.cn'
  default-nameserver:
    - 'https://8.8.8.8/dns-query'
    - 'https://223.5.5.5/dns-query'
  proxy-server-nameserver:
    - 'https://223.5.5.5/dns-query'
    - 'https://8.8.8.8/dns-query'
  nameserver:
    - 'https://223.5.5.5/dns-query'
    - 'https://8.8.8.8/dns-query'
  nameserver-policy:
    'geosite:cn':
      - 'https://223.5.5.5/dns-query'
    'geosite:private':
      - 'https://223.5.5.5/dns-query'
      - 'https://8.8.8.8/dns-query'

# 系统代理跳过列表（起作用）
cfw-bypass:
  - "*.cn"
  - "*.xn--fiqs8s"
  - "*.xn--55qx5d"
  - "*.xn--io0a7i"
  - "*alicdn*"
  - "*alipay*"
  - "*bilibili*"
  - "*xiaomi*"
  - "*.360.com"
  - "*.alibaba.com"
  - "*.aliyun.com"
  - "*.aliyundrive.com"
